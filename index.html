<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>PWA Tracker Pro</title>

    <!-- PWA Manifest Injected dynamically via JS for Widget Support -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --brand: #fc4c02; /* Strava Orange */ }
        body { 
            overscroll-behavior-y: contain; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
        }
        #map-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; filter: saturate(1.2) contrast(1.1); }
        
        .glass-panel {
            background: rgba(15, 15, 18, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
        }

        .ui-layer { z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .leaflet-control-attribution, .leaflet-control-zoom { display: none !important; }

        /* Progress Ring Animation */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* Map fading gradient */
        .map-gradient {
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 20%, rgba(0,0,0,0) 50%, #000000 95%);
        }
    </style>
</head>
<body class="text-white overflow-hidden antialiased">

    <!-- Leaflet Map Background -->
    <div id="map-container"></div>
    <div class="absolute inset-0 z-0 map-gradient pointer-events-none"></div>

    <!-- UI Overlay -->
    <div class="absolute inset-0 flex flex-col justify-between ui-layer p-4 pb-10 safe-area-pt">
        
        <!-- Top Navigation & Diagnostic -->
        <header class="flex flex-col gap-3 interactive mt-4">
            <div class="flex justify-between items-center px-2">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full bg-[#fc4c02] flex items-center justify-center shadow-[0_0_15px_rgba(252,76,2,0.5)]">
                        <i data-lucide="flame" class="w-5 h-5 text-white"></i>
                    </div>
                    <h1 class="font-bold text-xl tracking-tight">Aktivitas</h1>
                </div>
                <div id="gps-status" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-red-500/20 text-red-500 border border-red-500/30 text-xs font-semibold backdrop-blur-md transition-colors">
                    <div class="w-2 h-2 rounded-full bg-current animate-pulse"></div>
                    <span id="gps-text">No Signal</span>
                </div>
            </div>

            <!-- Hardware Diagnostic Panel -->
            <div id="diagnostic-panel" class="hidden flex-col gap-1 text-[10px] font-mono text-gray-400 px-2">
                <div class="flex justify-between">
                    <span>Engine: <span id="dbg-engine" class="text-white">STANDBY</span></span>
                    <span>State: <span id="dbg-state" class="text-green-400">READY</span></span>
                </div>
                <div class="flex justify-between items-center bg-gray-900/50 p-1.5 rounded-lg border border-gray-800">
                    <span>Sensitivitas: <span id="dbg-sens" class="text-white font-bold">0.3</span> m/s²</span>
                    <input type="range" id="sens-slider" min="0.1" max="2.0" step="0.1" value="0.3" class="w-24 accent-[#fc4c02]">
                </div>
                <div id="err-banner" class="text-red-400 bg-red-900/30 p-1 rounded hidden font-bold text-center">SENSOR DIBLOKIR. GUNAKAN HTTPS.</div>
            </div>
        </header>

        <!-- Main Dashboard -->
        <main class="w-full max-w-md mx-auto interactive animate-slide-up">
            
            <div class="glass-panel p-6 shadow-2xl flex flex-col items-center relative overflow-hidden">
                <!-- Background glow -->
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 bg-[#fc4c02] opacity-10 blur-3xl rounded-full pointer-events-none"></div>

                <!-- Radial Progress for Steps -->
                <div class="relative w-48 h-48 flex items-center justify-center mb-6">
                    <svg class="w-full h-full transform" viewBox="0 0 100 100">
                        <circle class="text-gray-800 stroke-current" stroke-width="6" cx="50" cy="50" r="44" fill="transparent"></circle>
                        <circle id="step-ring" class="text-[#fc4c02] progress-ring__circle stroke-current" stroke-width="6" stroke-linecap="round" cx="50" cy="50" r="44" fill="transparent" stroke-dasharray="276.46" stroke-dashoffset="276.46"></circle>
                    </svg>
                    <div class="absolute flex flex-col items-center justify-center">
                        <i data-lucide="footprints" class="w-6 h-6 text-gray-400 mb-1 opacity-50"></i>
                        <span id="val-steps" class="text-5xl font-black tracking-tighter text-white">0</span>
                        <span class="text-xs font-semibold text-gray-500 uppercase tracking-widest mt-1">Langkah</span>
                    </div>
                </div>

                <!-- Metrics Grid -->
                <div class="grid grid-cols-2 w-full gap-4 mb-8">
                    <div class="flex flex-col items-center bg-white/5 rounded-2xl p-4 border border-white/5">
                        <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Jarak (KM)</span>
                        <span id="val-distance" class="text-3xl font-bold font-mono text-white">0.00</span>
                    </div>
                    <div class="flex flex-col items-center bg-white/5 rounded-2xl p-4 border border-white/5">
                        <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Durasi</span>
                        <span id="val-time" class="text-3xl font-bold font-mono text-white">00:00</span>
                    </div>
                </div>

                <!-- Action Controls -->
                <div class="flex items-center gap-6">
                    <button id="btn-diag" class="w-12 h-12 rounded-full bg-gray-800 text-gray-400 flex items-center justify-center active:scale-95 transition-transform border border-gray-700">
                        <i data-lucide="settings-2" class="w-5 h-5"></i>
                    </button>

                    <button id="btn-toggle" class="relative group flex items-center justify-center w-20 h-20 bg-[#fc4c02] rounded-full shadow-[0_8px_32px_rgba(252,76,2,0.4)] transition-all active:scale-90">
                        <div class="absolute inset-0 rounded-full border border-white/30 scale-110 group-active:scale-100 transition-transform"></div>
                        <i id="icon-start" data-lucide="play" class="w-8 h-8 text-white fill-current ml-1"></i>
                        <i id="icon-stop" data-lucide="square" class="w-6 h-6 text-white fill-current hidden"></i>
                    </button>
                    
                    <button id="btn-finish" class="w-12 h-12 rounded-full bg-gray-800 text-gray-400 flex items-center justify-center active:scale-95 transition-transform border border-gray-700 opacity-50 pointer-events-none">
                        <i data-lucide="flag" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        /**
         * ARSITEKTUR KONTROL PWA & WIDGET (LOGIKA BARU)
         * BroadcastChannel digunakan untuk mensinkronisasi state PWA ke Service Worker.
         * Ini adalah fondasi mutlak untuk memperbarui Android/iOS Web Widget.
         */
        const widgetChannel = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel('pwa-widget-sync') : null;
        
        function syncWidgetState(data) {
            if (widgetChannel) widgetChannel.postMessage({ type: 'SYNC_STATE', payload: data });
            // Dalam environment produksi, Service Worker akan mencegat pesan ini 
            // dan memanggil navigator.setAppBadge() atau Action Blocks untuk mengupdate UI Widget.
        }

        // KONFIGURASI ENGINE
        const ENGINE = {
            THRESHOLD: 0.3, // Sangat sensitif. 0.3 mendeteksi translasi mikroskopis.
            COOLDOWN_MS: 250, // Mencegah 1 guncangan dihitung 2 kali.
            RING_CIRCUMFERENCE: 276.46, // 2 * pi * 44 (radius svg)
            DAILY_GOAL: 10000 
        };

        const State = {
            isActive: false, startTime: 0, elapsedSec: 0, steps: 0, distance: 0,
            lastMag: null, lastStepTimestamp: 0, coordinates: [], watchId: null, timerId: null,
            sensorType: 'NONE' // Identifikasi API mana yang berhasil menembus sandbox
        };

        const DOM = {
            valSteps: document.getElementById('val-steps'), valDist: document.getElementById('val-distance'),
            valTime: document.getElementById('val-time'), stepRing: document.getElementById('step-ring'),
            btnToggle: document.getElementById('btn-toggle'), iconStart: document.getElementById('icon-start'),
            iconStop: document.getElementById('icon-stop'), gpsStatus: document.getElementById('gps-status'),
            gpsText: document.getElementById('gps-text'), errBanner: document.getElementById('err-banner'),
            dbgEngine: document.getElementById('dbg-engine'), dbgState: document.getElementById('dbg-state'),
            dbgSens: document.getElementById('dbg-sens'), sensSlider: document.getElementById('sens-slider'),
            btnDiag: document.getElementById('btn-diag'), diagPanel: document.getElementById('diagnostic-panel'),
            btnFinish: document.getElementById('btn-finish')
        };

        let map, polyline, currentMarker;

        // INISIALISASI PETA
        function initMap() {
            map = L.map('map-container', { zoomControl: false, dragging: false, scrollWheelZoom: false }).setView([-2.5489, 118.0149], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
            polyline = L.polyline([], { color: '#fc4c02', weight: 6, opacity: 0.9, lineCap: 'round', lineJoin: 'round' }).addTo(map);
        }

        // UTILITAS MATEMATIKA
        function calcDistance(lat1, lon1, lat2, lon2) {
            const p = 0.017453292519943295;
            const c = Math.cos;
            const a = 0.5 - c((lat2 - lat1) * p)/2 + c(lat1 * p) * c(lat2 * p) * (1 - c((lon2 - lon1) * p))/2;
            return 12742 * Math.asin(Math.sqrt(a));
        }

        function formatTime(s) {
            return (s - (s %= 60)) / 60 + (9 < s ? ':' : ':0') + s;
        }

        function updateRing(steps) {
            const pct = Math.min(steps / ENGINE.DAILY_GOAL, 1);
            DOM.stepRing.style.strokeDashoffset = ENGINE.RING_CIRCUMFERENCE - (pct * ENGINE.RING_CIRCUMFERENCE);
        }

        // LOGIKA KORELASI SENSOR (HYPER-SENSITIVE)
        function processSensorDelta(x, y, z) {
            // Hitung magnitudo vektor 3D
            const mag = Math.sqrt(x*x + y*y + z*z);
            
            if (State.lastMag === null) {
                State.lastMag = mag;
                return;
            }

            // Hitung delta (selisih murni antar frame). Rotasi statis menghasilkan delta mendekati 0.
            const delta = Math.abs(mag - State.lastMag);
            const now = Date.now();

            if (delta > ENGINE.THRESHOLD && (now - State.lastStepTimestamp) > ENGINE.COOLDOWN_MS) {
                State.steps++;
                State.lastStepTimestamp = now;
                
                // Update UI
                DOM.valSteps.innerText = State.steps;
                updateRing(State.steps);
                
                // Sinkronisasi ke Widget Background
                syncWidgetState({ steps: State.steps, distance: State.distance });
            }

            State.lastMag = mag;
        }

        // ADAPTER SENSOR: DeviceMotion (Legacy W3C)
        function motionHandler(e) {
            let acc = e.accelerationIncludingGravity || e.acceleration;
            if (acc && acc.x !== null) {
                State.sensorType = 'DeviceMotion';
                DOM.dbgEngine.innerText = 'DeviceMotion API';
                DOM.errBanner.classList.add('hidden');
                processSensorDelta(acc.x, acc.y, acc.z);
            } else {
                DOM.errBanner.classList.remove('hidden');
            }
        }

        // MANAJEMEN STATE
        async function toggleTracking() {
            if (State.isActive) return stopTracking();

            // Otorisasi Keamanan Sensor (Mutlak untuk iOS)
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const perm = await DeviceMotionEvent.requestPermission();
                    if (perm !== 'granted') return alert('Izin sensor ditolak.');
                } catch (e) {
                    DOM.errBanner.classList.remove('hidden');
                    return;
                }
            }

            startTracking();
        }

        function startTracking() {
            State.isActive = true;
            State.steps = 0; State.distance = 0; State.elapsedSec = 0; State.lastMag = null; State.coordinates = [];
            polyline.setLatLngs([]);
            
            DOM.iconStart.classList.add('hidden'); DOM.iconStop.classList.remove('hidden');
            DOM.btnToggle.classList.replace('bg-[#fc4c02]', 'bg-gray-800');
            DOM.btnFinish.classList.remove('opacity-50', 'pointer-events-none');
            DOM.btnFinish.classList.add('bg-white', 'text-black');
            
            DOM.valSteps.innerText = '0'; DOM.valDist.innerText = '0.00'; DOM.valTime.innerText = '00:00';
            updateRing(0);

            // Coba implementasi Generic Sensor API (Modern Android) sebagai preferensi pertama
            if ('Accelerometer' in window) {
                try {
                    const acl = new Accelerometer({ frequency: 30 });
                    acl.addEventListener('reading', () => {
                        State.sensorType = 'Generic API';
                        DOM.dbgEngine.innerText = 'Generic Sensor API';
                        processSensorDelta(acl.x, acl.y, acl.z);
                    });
                    acl.start();
                    window._aclInstance = acl; // Simpan referensi untuk stop
                } catch (e) {
                    // Fallback ke DeviceMotion
                    window.addEventListener('devicemotion', motionHandler, true);
                }
            } else {
                window.addEventListener('devicemotion', motionHandler, true);
            }

            State.timerId = setInterval(() => {
                State.elapsedSec++;
                DOM.valTime.innerText = formatTime(State.elapsedSec);
            }, 1000);

            startGPS();
        }

        function stopTracking() {
            State.isActive = false;
            clearInterval(State.timerId);
            if (State.watchId) navigator.geolocation.clearWatch(State.watchId);
            
            if (window._aclInstance) {
                window._aclInstance.stop();
            } else {
                window.removeEventListener('devicemotion', motionHandler, true);
            }

            DOM.iconStop.classList.add('hidden'); DOM.iconStart.classList.remove('hidden');
            DOM.btnToggle.classList.replace('bg-gray-800', 'bg-[#fc4c02]');
            
            DOM.gpsStatus.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-gray-500/20 text-gray-400 border border-gray-500/30 text-xs font-semibold backdrop-blur-md";
            DOM.gpsText.innerText = "Standby";
            DOM.gpsStatus.querySelector('div').classList.remove('animate-pulse');
        }

        function startGPS() {
            if (!("geolocation" in navigator)) return;
            
            DOM.gpsStatus.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-yellow-500/20 text-yellow-500 border border-yellow-500/30 text-xs font-semibold backdrop-blur-md";
            DOM.gpsText.innerText = "Mencari GPS...";

            State.watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const acc = pos.coords.accuracy;
                    if (acc > 50) return; // Abaikan data tidak akurat

                    DOM.gpsStatus.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-emerald-500/20 text-emerald-500 border border-emerald-500/30 text-xs font-semibold backdrop-blur-md";
                    DOM.gpsText.innerText = "GPS Terkunci";

                    const lat = pos.coords.latitude; const lon = pos.coords.longitude;
                    const newPt = [lat, lon];
                    
                    if (State.coordinates.length > 0) {
                        const lastPt = State.coordinates[State.coordinates.length - 1];
                        const dist = calcDistance(lastPt[0], lastPt[1], lat, lon);
                        if (dist > 0.001) { // Filter pergerakan mikro
                            State.distance += dist;
                            DOM.valDist.innerText = State.distance.toFixed(2);
                            syncWidgetState({ steps: State.steps, distance: State.distance });
                        }
                    }

                    State.coordinates.push(newPt);
                    polyline.addLatLng(newPt);
                    map.setView(newPt, 16, { animate: true });

                    if (!currentMarker) {
                        currentMarker = L.circleMarker(newPt, { radius: 8, fillColor: "#fc4c02", color: "#fff", weight: 3, opacity: 1, fillOpacity: 1 }).addTo(map);
                    } else {
                        currentMarker.setLatLng(newPt);
                    }
                },
                (err) => {
                    DOM.gpsStatus.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-red-500/20 text-red-500 border border-red-500/30 text-xs font-semibold backdrop-blur-md";
                    DOM.gpsText.innerText = "Sinyal Hilang";
                }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 5000 }
            );
        }

        // EVENT LISTENERS UI
        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            lucide.createIcons();
            
            // Slider sensitivitas
            DOM.sensSlider.addEventListener('input', (e) => {
                ENGINE.THRESHOLD = parseFloat(e.target.value);
                DOM.dbgSens.innerText = ENGINE.THRESHOLD.toFixed(1);
            });

            // Toggle Panel Diagnostik
            DOM.btnDiag.addEventListener('click', () => DOM.diagPanel.classList.toggle('hidden'));
            
            // Kontrol Utama
            DOM.btnToggle.addEventListener('click', toggleTracking);
            DOM.btnFinish.addEventListener('click', () => {
                if(State.isActive) stopTracking();
                alert(`Aktivitas Selesai!\nLangkah: ${State.steps}\nJarak: ${State.distance.toFixed(2)} KM\nDurasi: ${formatTime(State.elapsedSec)}`);
            });

            // Cari lokasi awal
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(pos => {
                    map.setView([pos.coords.latitude, pos.coords.longitude], 15);
                }, () => {}, { enableHighAccuracy: false, timeout: 5000 });
            }
        });
    </script>
</body>
</html>
