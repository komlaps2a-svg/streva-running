<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>PWA Tracker Pro</title>

    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --brand: #fc4c02; }
        body { overscroll-behavior-y: contain; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000; }
        #map-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; filter: saturate(1.2) contrast(1.1); }
        .ui-layer { z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .glass-panel { background: rgba(15, 15, 18, 0.85); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.05); border-radius: 28px; }
        .leaflet-control-attribution, .leaflet-control-zoom { display: none !important; }
        .map-gradient { background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 25%, rgba(0,0,0,0) 60%, #000000 100%); }
        
        /* Modal Animation */
        .modal-enter { animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-white overflow-hidden antialiased">

    <div id="map-container"></div>
    <div class="absolute inset-0 z-0 map-gradient pointer-events-none"></div>

    <div class="absolute inset-0 flex flex-col justify-between ui-layer p-4 pb-8 safe-area-pt">
        
        <header class="flex justify-between items-center interactive mt-2 px-2">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-[#fc4c02] flex items-center justify-center shadow-[0_0_15px_rgba(252,76,2,0.5)]">
                    <i data-lucide="flame" class="w-5 h-5 text-white"></i>
                </div>
                <h1 class="font-bold text-xl tracking-tight">Run Track</h1>
            </div>
            <div id="gps-status" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-red-500/20 text-red-500 border border-red-500/30 text-xs font-semibold backdrop-blur-md">
                <div class="w-2 h-2 rounded-full bg-current animate-pulse"></div>
                <span id="gps-text">No GPS</span>
            </div>
        </header>

        <main class="w-full max-w-md mx-auto interactive">
            <div class="glass-panel p-5 shadow-2xl flex flex-col relative overflow-hidden">
                
                <!-- Main Metrics Grid -->
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Jarak</span>
                        <span class="text-4xl font-black font-mono text-white flex items-baseline gap-1">
                            <span id="val-distance">0.00</span><span class="text-sm text-gray-400">km</span>
                        </span>
                    </div>
                    <div class="flex flex-col items-end">
                        <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Durasi</span>
                        <span id="val-time" class="text-4xl font-black font-mono text-white">00:00</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6 pt-4 border-t border-white/10">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Pace (Waktu/Km)</span>
                        <span id="val-pace" class="text-2xl font-bold font-mono text-[#fc4c02]">--:--</span>
                    </div>
                    <div class="flex flex-col items-end">
                        <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Langkah</span>
                        <span id="val-steps" class="text-2xl font-bold font-mono text-white">0</span>
                    </div>
                </div>

                <!-- Controls -->
                <div class="flex items-center justify-between mt-2">
                    <button id="btn-settings" class="w-12 h-12 rounded-full bg-gray-800 text-gray-400 flex items-center justify-center active:scale-95 transition-transform border border-gray-700">
                        <i data-lucide="settings" class="w-5 h-5"></i>
                    </button>

                    <button id="btn-toggle" class="relative group flex items-center justify-center w-20 h-20 bg-[#fc4c02] rounded-full shadow-[0_8px_32px_rgba(252,76,2,0.4)] transition-all active:scale-90">
                        <i id="icon-start" data-lucide="play" class="w-8 h-8 text-white fill-current ml-1"></i>
                        <i id="icon-stop" data-lucide="square" class="w-6 h-6 text-white fill-current hidden"></i>
                    </button>
                    
                    <button id="btn-finish" class="w-12 h-12 rounded-full bg-gray-800 text-gray-400 flex items-center justify-center active:scale-95 transition-transform border border-gray-700 opacity-50 pointer-events-none">
                        <i data-lucide="flag" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="modal-settings" class="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm hidden flex-col justify-end interactive">
        <div class="bg-gray-900 w-full rounded-t-3xl p-6 border-t border-gray-800 modal-enter">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Pengaturan</h2>
                <button id="btn-close-settings" class="p-2 bg-gray-800 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <div class="space-y-6">
                <!-- Sensitivity -->
                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-sm font-semibold text-gray-400">Sensitivitas Guncangan</label>
                        <span id="lbl-sens" class="text-sm font-mono text-[#fc4c02] font-bold">Medium (1.5)</span>
                    </div>
                    <input type="range" id="input-sens" min="0.5" max="4.0" step="0.1" value="1.5" class="w-full accent-[#fc4c02]">
                    <p class="text-[10px] text-gray-500 mt-1">Geser ke kiri jika langkah sulit terdeteksi. Geser ke kanan jika terlalu sensitif.</p>
                </div>

                <!-- Export GPX -->
                <button id="btn-export-gpx" class="w-full py-3 rounded-xl bg-gray-800 border border-gray-700 font-semibold flex items-center justify-center gap-2 active:bg-gray-700">
                    <i data-lucide="download" class="w-4 h-4"></i> Ekspor Track (GPX)
                </button>

                <!-- Install PWA / Widget -->
                <button id="btn-install" class="w-full py-3 rounded-xl bg-[#fc4c02] text-white font-bold flex items-center justify-center gap-2 hidden active:bg-orange-600 shadow-[0_0_15px_rgba(252,76,2,0.3)]">
                    <i data-lucide="download-cloud" class="w-4 h-4"></i> Tambahkan App/Widget ke Home
                </button>
            </div>
        </div>
    </div>

    <script>
        // ENGINE CONFIG
        const ENGINE = {
            THRESHOLD: 1.5, // Dinamis via slider
            COOLDOWN_MS: 300,
            GPS_ACCURACY_LIMIT: 40 // Meter
        };

        const State = {
            isActive: false, elapsedSec: 0, steps: 0, distance: 0,
            gravity: 9.81, lastStepTime: 0, coordinates: [], watchId: null, timerId: null,
            deferredPrompt: null // Untuk PWA Install
        };

        const DOM = {
            valSteps: document.getElementById('val-steps'), valDist: document.getElementById('val-distance'),
            valTime: document.getElementById('val-time'), valPace: document.getElementById('val-pace'),
            btnToggle: document.getElementById('btn-toggle'), iconStart: document.getElementById('icon-start'),
            iconStop: document.getElementById('icon-stop'), btnFinish: document.getElementById('btn-finish'),
            gpsStatus: document.getElementById('gps-status'), gpsText: document.getElementById('gps-text'),
            modalSettings: document.getElementById('modal-settings'), btnSettings: document.getElementById('btn-settings'),
            btnCloseSettings: document.getElementById('btn-close-settings'), inputSens: document.getElementById('input-sens'),
            lblSens: document.getElementById('lbl-sens'), btnExportGPX: document.getElementById('btn-export-gpx'),
            btnInstall: document.getElementById('btn-install')
        };

        let map, polyline, currentMarker;

        // --- MAP INITIALIZATION ---
        function initMap() {
            map = L.map('map-container', { zoomControl: false }).setView([-2.5489, 118.0149], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
            polyline = L.polyline([], { color: '#fc4c02', weight: 5, opacity: 0.9, lineCap: 'round', lineJoin: 'round' }).addTo(map);
        }

        // --- UTILS ---
        function calcDistance(lat1, lon1, lat2, lon2) {
            const p = Math.PI / 180, c = Math.cos;
            const a = 0.5 - c((lat2 - lat1) * p)/2 + c(lat1 * p) * c(lat2 * p) * (1 - c((lon2 - lon1) * p))/2;
            return 12742 * Math.asin(Math.sqrt(a)); // KM
        }

        function formatTime(s) {
            return (s - (s %= 60)) / 60 + (9 < s ? ':' : ':0') + s;
        }

        // Kalkulasi Pace (Menit per Kilometer)
        function updatePace() {
            if (State.distance < 0.01 || State.elapsedSec < 5) return; // Butuh min 10 meter untuk kalkulasi akurat
            const paceSecondsPerKm = State.elapsedSec / State.distance;
            const pMins = Math.floor(paceSecondsPerKm / 60);
            const pSecs = Math.floor(paceSecondsPerKm % 60);
            
            // Batasi pace logika (jika lebih dari 60 menit/km berarti tidak wajar)
            if (pMins > 60) DOM.valPace.innerText = ">60:00";
            else DOM.valPace.innerText = `${pMins}:${pSecs.toString().padStart(2, '0')}`;
        }

        // --- SENSOR LOGIC (HIGH PASS FILTER) ---
        function motionHandler(e) {
            // Wajib gunakan accelerationIncludingGravity untuk mem-bypass pemblokiran hardware
            let raw = e.accelerationIncludingGravity || e.acceleration;
            if (!raw || raw.x === null) return;

            // Kalkulasi Magnitudo Absolut Vektor 3D
            const mag = Math.sqrt(raw.x**2 + raw.y**2 + raw.z**2);
            
            // Low-Pass Filter: Isolasi Gravitasi Bumi secara dinamis
            const alpha = 0.9;
            State.gravity = (alpha * State.gravity) + ((1 - alpha) * mag);
            
            // High-Pass Filter: Percepatan Linier Murni (Tanpa Gravitasi)
            const linearAcc = Math.abs(mag - State.gravity);
            
            const now = Date.now();
            if (linearAcc > ENGINE.THRESHOLD && (now - State.lastStepTime) > ENGINE.COOLDOWN_MS) {
                State.steps++;
                State.lastStepTime = now;
                DOM.valSteps.innerText = State.steps;
            }
        }

        // --- CORE TRACKING ---
        async function toggleTracking() {
            if (State.isActive) return stopTracking();

            // iOS 13+ Otorisasi
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const perm = await DeviceMotionEvent.requestPermission();
                    if (perm !== 'granted') return alert('Akses Sensor Ditolak OS.');
                } catch (e) {
                    return alert('Wajib akses via HTTPS untuk menggunakan sensor.');
                }
            }
            startTracking();
        }

        function startTracking() {
            State.isActive = true; State.steps = 0; State.distance = 0; State.elapsedSec = 0; State.coordinates = [];
            polyline.setLatLngs([]);
            
            DOM.iconStart.classList.add('hidden'); DOM.iconStop.classList.remove('hidden');
            DOM.btnToggle.classList.replace('bg-[#fc4c02]', 'bg-gray-800');
            DOM.btnFinish.classList.remove('opacity-50', 'pointer-events-none');
            
            DOM.valSteps.innerText = '0'; DOM.valDist.innerText = '0.00'; DOM.valTime.innerText = '00:00'; DOM.valPace.innerText = '--:--';

            window.addEventListener('devicemotion', motionHandler, true);

            State.timerId = setInterval(() => {
                State.elapsedSec++;
                DOM.valTime.innerText = formatTime(State.elapsedSec);
                updatePace();
            }, 1000);

            startGPS();
        }

        function stopTracking() {
            State.isActive = false;
            clearInterval(State.timerId);
            if (State.watchId) navigator.geolocation.clearWatch(State.watchId);
            window.removeEventListener('devicemotion', motionHandler, true);

            DOM.iconStop.classList.add('hidden'); DOM.iconStart.classList.remove('hidden');
            DOM.btnToggle.classList.replace('bg-gray-800', 'bg-[#fc4c02]');
            DOM.gpsStatus.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-gray-500/20 text-gray-400 border border-gray-500/30 text-xs font-semibold backdrop-blur-md";
            DOM.gpsText.innerText = "Standby";
        }

        function startGPS() {
            if (!("geolocation" in navigator)) return;
            DOM.gpsStatus.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-yellow-500/20 text-yellow-500 border border-yellow-500/30 text-xs font-semibold backdrop-blur-md";
            DOM.gpsText.innerText = "Mencari GPS...";

            State.watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    if (pos.coords.accuracy > ENGINE.GPS_ACCURACY_LIMIT) return; // Buang data cacat

                    DOM.gpsStatus.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-emerald-500/20 text-emerald-500 border border-emerald-500/30 text-xs font-semibold backdrop-blur-md";
                    DOM.gpsText.innerText = "GPS Terkunci";

                    const pt = [pos.coords.latitude, pos.coords.longitude, Date.now()]; // Simpan timestamp untuk GPX
                    
                    if (State.coordinates.length > 0) {
                        const lastPt = State.coordinates[State.coordinates.length - 1];
                        const dist = calcDistance(lastPt[0], lastPt[1], pt[0], pt[1]);
                        if (dist > 0.002) { // Minimum threshold pergerakan 2 meter untuk mencegah drift
                            State.distance += dist;
                            DOM.valDist.innerText = State.distance.toFixed(2);
                        }
                    }

                    State.coordinates.push(pt);
                    polyline.addLatLng([pt[0], pt[1]]);
                    map.setView([pt[0], pt[1]], 16, { animate: true });

                    if (!currentMarker) currentMarker = L.circleMarker([pt[0], pt[1]], { radius: 8, fillColor: "#3b82f6", color: "#fff", weight: 3, opacity: 1, fillOpacity: 1 }).addTo(map);
                    else currentMarker.setLatLng([pt[0], pt[1]]);
                },
                (err) => {
                    DOM.gpsStatus.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-red-500/20 text-red-500 border border-red-500/30 text-xs font-semibold backdrop-blur-md";
                    DOM.gpsText.innerText = "Sinyal Hilang";
                }, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
        }

        // --- GPX EXPORT ---
        function exportToGPX() {
            if (State.coordinates.length === 0) return alert("Belum ada data rute untuk diekspor.");
            
            let gpxData = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="PWA Tracker Pro" xmlns="http://www.topografix.com/GPX/1/1">
  <trk>
    <name>Run Activity ${new Date().toLocaleDateString()}</name>
    <trkseg>\n`;
            
            State.coordinates.forEach(c => {
                gpxData += `      <trkpt lat="${c[0]}" lon="${c[1]}"><time>${new Date(c[2]).toISOString()}</time></trkpt>\n`;
            });

            gpxData += `    </trkseg>
  </trk>
</gpx>`;

            const blob = new Blob([gpxData], { type: "application/gpx+xml" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `Aktivitas_${Date.now()}.gpx`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // --- EVENT LISTENERS & PWA INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            initMap(); lucide.createIcons();
            
            // UI Modals
            DOM.btnSettings.onclick = () => DOM.modalSettings.classList.replace('hidden', 'flex');
            DOM.btnCloseSettings.onclick = () => DOM.modalSettings.classList.replace('flex', 'hidden');
            
            // Sensitivitas logic
            DOM.inputSens.oninput = (e) => {
                ENGINE.THRESHOLD = parseFloat(e.target.value);
                const val = ENGINE.THRESHOLD;
                let lbl = "Medium";
                if(val < 1.0) lbl = "Tinggi (Sensitif)";
                else if(val > 2.0) lbl = "Rendah (Kasar)";
                DOM.lblSens.innerText = `${lbl} (${val.toFixed(1)})`;
            };

            // Tombol Eksekusi
            DOM.btnToggle.onclick = toggleTracking;
            DOM.btnExportGPX.onclick = exportToGPX;
            DOM.btnFinish.onclick = () => {
                if(State.isActive) stopTracking();
                alert(`Latihan Selesai!\nJarak: ${State.distance.toFixed(2)} km\nPace: ${DOM.valPace.innerText}\nLangkah: ${State.steps}`);
            };

            // PWA Install / Widget Bindings
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                State.deferredPrompt = e;
                DOM.btnInstall.classList.remove('hidden'); // Tampilkan tombol install jika device support
            });

            DOM.btnInstall.onclick = async () => {
                if (!State.deferredPrompt) return;
                State.deferredPrompt.prompt();
                const { outcome } = await State.deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    DOM.btnInstall.classList.add('hidden');
                }
                State.deferredPrompt = null;
            };

            // Service Worker Registration
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').catch(console.error);
            }
            
            // Cek lokasi awal
            if ("geolocation" in navigator) navigator.geolocation.getCurrentPosition(pos => map.setView([pos.coords.latitude, pos.coords.longitude], 15), ()=>{}, {enableHighAccuracy: false});
        });
    </script>
</body>
</html>
